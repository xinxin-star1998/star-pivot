# =============================================================================
# StarPivot 主配置（公共部分）
# =============================================================================
# 激活环境：spring.profiles.active=dev|test|prod|local
# 启动覆盖：--spring.profiles.active=dev 或环境变量 SPRING_PROFILES_ACTIVE

spring:
  application:
    name: star-pivot
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  sql:
    init:
      mode: never
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
  datasource:
    druid:
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
        login-username: admin
        login-password: admin123
        reset-enable: false
      web-stat-filter:
        enabled: true
        url-pattern: /*
        exclusions: "*.js,*.gif,*.jpg,*.png,*.css,*.ico,/druid/*"

server:
  port: 8080
  servlet:
    context-path: /api

# -----------------------------------------------------------------------------
# MyBatis-Plus
# -----------------------------------------------------------------------------
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.star.pivot.system.domain,com.star.pivot.generator.domain
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# -----------------------------------------------------------------------------
# JWT（敏感项在各环境配置）
# -----------------------------------------------------------------------------
jwt:
  expiration: ${JWT_EXPIRATION:86400000}

# -----------------------------------------------------------------------------
# CORS（各环境配置 allowed-origins）
# -----------------------------------------------------------------------------
# -----------------------------------------------------------------------------
# 日志
# -----------------------------------------------------------------------------
logging:
  level:
    root: info

# -----------------------------------------------------------------------------
# 阿里云 OSS（各环境配置 endpoint/access-key 等）
# -----------------------------------------------------------------------------
oss:
  bucket-name: star-pivot

# -----------------------------------------------------------------------------
# MinIO 配置（可选，如需使用 MinIO 替换 OSS）
# -----------------------------------------------------------------------------
minio:
  bucket-name: star-pivot-avatar

# -----------------------------------------------------------------------------
# 代码生成
# -----------------------------------------------------------------------------
gen:
  author: admin
  packageName: com.star.pivot.system
  autoRemovePre: false
  tablePrefix: sys_
  allowOverwrite: false

# -----------------------------------------------------------------------------
# 登录限流与账户锁定
# -----------------------------------------------------------------------------
login:
  rate-limit:
    enabled: true
    ip:
      max-attempts: 10
      window-minutes: 1
    ip-username:
      max-attempts: 5
      window-minutes: 1
  account-lock:
    enabled: true
    max-failures: 5
    lock-duration-minutes: 5
    failure-record-expire-minutes: 10

# -----------------------------------------------------------------------------
# StarPivot 统一配置（JWT 刷新 / 缓存 / 监控）
# -----------------------------------------------------------------------------
star-pivot:
  jwt:
    expiration: ${JWT_EXPIRATION:86400000}
    refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}
  cache:
    menu-tree-ttl: 3600
    dict-data-ttl: 3600
    user-permissions-ttl: 1800
  monitor:
    api-performance-enabled: true
    slow-api-threshold-ms: 1000
    sample-rate: 0.1

# -----------------------------------------------------------------------------
# Actuator
# -----------------------------------------------------------------------------
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: false

# -----------------------------------------------------------------------------
# SpringDoc OpenAPI（Swagger）
# -----------------------------------------------------------------------------
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    display-operation-id: true
    display-request-duration: true
    default-expand-depth: 1
    filter: true
    disable-swagger-default-url: true
  show-actuator: false
