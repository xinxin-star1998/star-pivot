# Spring Boot 父配置文件
# 通过 spring.profiles.active 控制激活哪个环境配置文件
# 可选值: dev, test, prod
# 也可以通过启动参数指定: --spring.profiles.active=dev

spring:
  application:
    name: permission-system
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev} # 默认激活开发环境，可通过环境变量或启动参数覆盖
  servlet:
    multipart:
      max-file-size: 10MB # 限制上传文件大小
      max-request-size: 10MB
  # 禁用数据库初始化依赖检测（修复MyBatis-Plus与Spring Boot 3.x兼容性问题）
  sql:
    init:
      mode: never
  # Jackson 配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

# 服务器配置
server:
  port: 8080
  servlet:
    context-path: /api

# MyBatis-Plus 公共配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.star.pivot.system.domain,com.star.pivot.generator.domain
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT 公共配置
jwt:
  expiration: ${JWT_EXPIRATION:86400000} # 24小时，单位：毫秒

# CORS 公共配置
cors:
  # 具体允许的域名在各环境配置文件中设置

# 日志公共配置
logging:
  level:
    root: info

# 阿里云 OSS 公共配置
oss:
  bucket-name: star-pivot # 存储桶名称（需提前创建）

# 代码生成配置
gen:
  # 作者
  author: xinxin
  # 默认生成包路径 system 需改成自己的模块名称 如 system monitor tool
  packageName: com.star.pivot.system
  # 自动去除表前缀，默认是false
  autoRemovePre: false
  # 表前缀（生成类名不会包含表前缀，多个用逗号分隔）
  tablePrefix: sys_
  # 是否允许生成文件覆盖到本地（自定义路径），默认不允许
  allowOverwrite: false

# 登录限流与防暴力破解配置
login:
  # 限流配置
  rate-limit:
    # 是否启用限流
    enabled: true
    # IP维度限流配置
    ip:
      # 每分钟允许的最大登录次数
      max-attempts: 10
      # 时间窗口（分钟）
      window-minutes: 1
    # IP+用户名维度限流配置
    ip-username:
      # 每分钟允许的最大登录次数
      max-attempts: 5
      # 时间窗口（分钟）
      window-minutes: 1
  # 账户锁定配置
  account-lock:
    # 是否启用账户锁定
    enabled: true
    # 连续失败N次后锁定账户
    max-failures: 5
    # 账户锁定时长（分钟）
    lock-duration-minutes: 5
    # 失败次数记录的过期时间（分钟），应大于锁定时长
    failure-record-expire-minutes: 10