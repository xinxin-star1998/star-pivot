server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: permission-system
  profiles:
    active: dev
  
  # 禁用数据库初始化依赖检测（修复MyBatis-Plus与Spring Boot 3.x兼容性问题）
  sql:
    init:
      mode: never
  
  # 允许循环引用
#  main:
#    allow-circular-references: true
  
  # 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/star-pivot?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=GMT%2B8}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  
  # Jackson 配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    # 生产环境建议使用 none，开发环境可以使用 stdout
    log-impl: ${MYBATIS_LOG_IMPL:org.apache.ibatis.logging.stdout.StdOutImpl}
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.star.pivot.system.domain
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT 配置
jwt:
  secret: 6Lm1ZHUCNfn+rczk0llWuOp4uA2CtJSCoz72X8V+wy0=
  expiration: 86400000 # 24小时，单位：毫秒

# 日志配置
logging:
  level:
    com.star.pivot: ${LOG_LEVEL:info}
    org.springframework.security: ${SECURITY_LOG_LEVEL:warn}
    org.apache.ibatis: ${SQL_LOG_LEVEL:OFF}

# 代码生成配置
gen:
  # 作者
  author: xinxin
  # 默认生成包路径 system 需改成自己的模块名称 如 system monitor tool
  packageName: com.star.pivot.system
  # 自动去除表前缀，默认是false
  autoRemovePre: false
  # 表前缀（生成类名不会包含表前缀，多个用逗号分隔）
  tablePrefix: sys_
  # 是否允许生成文件覆盖到本地（自定义路径），默认不允许
  allowOverwrite: false