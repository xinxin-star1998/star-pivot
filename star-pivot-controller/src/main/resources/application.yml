server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: permission-system
  profiles:
    active: dev
  
  # 禁用数据库初始化依赖检测（修复MyBatis-Plus与Spring Boot 3.x兼容性问题）
  sql:
    init:
      mode: never
  
  # 允许循环引用
#  main:
#    allow-circular-references: true
  
  # 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 生产环境请启用SSL：useSSL=true&requireSSL=true
    url: ${DB_URL:jdbc:mysql://localhost:3306/star-pivot?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=GMT%2B8}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  

  
  # Jackson 配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    # Redis配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: ${REDIS_TIMEOUT:2000ms}

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    # 生产环境建议使用 none，开发环境可以使用 stdout
    log-impl: ${MYBATIS_LOG_IMPL:org.apache.ibatis.logging.stdout.StdOutImpl}
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.star.pivot.system.domain
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT 配置
jwt:
  # 生产环境请通过环境变量 JWT_SECRET 配置，不要直接写在配置文件中
  secret: ${JWT_SECRET:Dj4G8272xJONkOqkn1pM8q1n+U5MPLrRUCjXun3/Yeo=}
  expiration: ${JWT_EXPIRATION:86400000} # 24小时，单位：毫秒

# CORS 配置
cors:
  # 生产环境请通过环境变量 CORS_ALLOWED_ORIGINS 配置具体域名，多个用逗号分隔
  # 开发环境可以使用 * 允许所有域名
  allowed-origins: ${CORS_ALLOWED_ORIGINS:*}

# 日志配置
logging:
  level:
    com.star.pivot: ${LOG_LEVEL:info}
    org.springframework.security: ${SECURITY_LOG_LEVEL:warn}
    org.apache.ibatis: ${SQL_LOG_LEVEL:OFF}

# 代码生成配置
gen:
  # 作者
  author: xinxin
  # 默认生成包路径 system 需改成自己的模块名称 如 system monitor tool
  packageName: com.star.pivot.system
  # 自动去除表前缀，默认是false
  autoRemovePre: false
  # 表前缀（生成类名不会包含表前缀，多个用逗号分隔）
  tablePrefix: sys_
  # 是否允许生成文件覆盖到本地（自定义路径），默认不允许
  allowOverwrite: false