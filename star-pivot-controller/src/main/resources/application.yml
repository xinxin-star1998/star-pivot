spring:
  application:
    name: star-pivot
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  sql:
    init:
      mode: never
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
  datasource:
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 50
      max-wait: 30000
      validation-query: SELECT 1
      validation-query-timeout: 3
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20
      filters: stat,wall,slf4j
      connection-properties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=3000
      use-global-data-source-stat: true
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
        login-username: admin
        login-password: admin123
        reset-enable: false
      web-stat-filter:
        enabled: true
        url-pattern: /*
        exclusions: "*.js,*.gif,*.jpg,*.png,*.css,*.ico,/druid/*"

server:
  port: 8080
  servlet:
    context-path: /api
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain,text/css,text/javascript,application/javascript
    min-response-size: 1024

# -----------------------------------------------------------------------------
# MyBatis-Plus
# -----------------------------------------------------------------------------
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.star.pivot.system.domain,com.star.pivot.generator.domain,com.star.pivot.dict.domain
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# -----------------------------------------------------------------------------
# JWT（敏感项在各环境配置）
# -----------------------------------------------------------------------------
jwt:
  expiration: ${JWT_EXPIRATION:86400000}

# -----------------------------------------------------------------------------
# CORS（各环境配置 allowed-origins）
# -----------------------------------------------------------------------------
# -----------------------------------------------------------------------------
# 日志
# -----------------------------------------------------------------------------
logging:
  level:
    root: info

# -----------------------------------------------------------------------------
# 文件存储配置（控制使用 MinIO 还是 OSS）
# -----------------------------------------------------------------------------
file-storage:
  type: ${FILE_STORAGE_TYPE:oss}  # 可选值：minio 或 oss，默认使用 oss

# -----------------------------------------------------------------------------
# 阿里云 OSS（各环境配置 endpoint/access-key 等）
# -----------------------------------------------------------------------------
oss:
  endpoint: ${OSS_ENDPOINT:}
  access-key-id: ${OSS_ACCESS_KEY_ID:}
  access-key-secret: ${OSS_ACCESS_KEY_SECRET:}
  bucket-name: ${OSS_BUCKET_NAME:star-pivot}
  url-prefix: ${OSS_URL_PREFIX:}

# -----------------------------------------------------------------------------
# MinIO 配置（可选，如需使用 MinIO 替换 OSS）
# -----------------------------------------------------------------------------
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:admin}
  secret-key: ${MINIO_SECRET_KEY:admin123456}
  bucket-name: ${MINIO_BUCKET_NAME:star-pivot-avatar}
  url-prefix: ${MINIO_URL_PREFIX:}

# -----------------------------------------------------------------------------
# 代码生成
# -----------------------------------------------------------------------------
gen:
  author: admin
  packageName: com.star.pivot.system
  autoRemovePre: false
  tablePrefix: sys_
  allowOverwrite: false

# -----------------------------------------------------------------------------
# 登录限流与账户锁定
# -----------------------------------------------------------------------------
login:
  rate-limit:
    enabled: true
    ip:
      max-attempts: 10
      window-minutes: 1
    ip-username:
      max-attempts: 5
      window-minutes: 1
  account-lock:
    enabled: true
    max-failures: 5
    lock-duration-minutes: 5
    failure-record-expire-minutes: 10

# -----------------------------------------------------------------------------
# StarPivot：缓存 TTL（秒）与监控；JWT 见上方 jwt.*
# -----------------------------------------------------------------------------
star-pivot:
  cache:
    menu-tree-ttl: 3600
    dict-data-ttl: 3600
    user-permissions-ttl: 1800

# -----------------------------------------------------------------------------
# Actuator
# -----------------------------------------------------------------------------
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: false

# -----------------------------------------------------------------------------
# SpringDoc OpenAPI（Swagger）
# -----------------------------------------------------------------------------
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    display-operation-id: true
    display-request-duration: true
    default-expand-depth: 1
    filter: true
    disable-swagger-default-url: true
  show-actuator: false
