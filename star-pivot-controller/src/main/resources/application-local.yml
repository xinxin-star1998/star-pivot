# =============================================================================
# 开发环境：spring.profiles.active=dev
# =============================================================================
# 启动优化：懒加载、减小连接池、缩短超时，加快本地启动
spring:
  main:
    lazy-initialization: true  # 开发环境懒加载 Bean，显著缩短启动时间（首请求略慢）
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/star-pivot?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=GMT%2B8&connectTimeout=5000&socketTimeout=10000}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    druid:
      initial-size: 0
      min-idle: 2
      max-active: 10
      max-wait: 10000
      async-init: true
      time-between-eviction-runs-millis: 30000
      min-evictable-idle-time-millis: 180000
      validation-query: SELECT 1
      validation-query-timeout: 3
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      pool-prepared-statements: false
      max-pool-prepared-statement-per-connection-size: -1
      filters: stat,wall,slf4j
      connection-properties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=2000
      use-global-data-source-stat: true
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: ${REDIS_TIMEOUT:5000ms}

mybatis-plus:
  configuration:
    log-impl: ${MYBATIS_LOG_IMPL:org.apache.ibatis.logging.slf4j.Slf4jImpl}

jwt:
  secret: ${JWT_SECRET:Dj4G8272xJONkOqkn1pM8q1n+U5MPLrRUCjXun3/Yeo=}
  previous-secret: ${JWT_PREVIOUS_SECRET:}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:*}

logging:
  level:
    com.star.pivot: ${LOG_LEVEL:debug}
    org.springframework.security: ${SECURITY_LOG_LEVEL:debug}
    org.apache.ibatis: ${SQL_LOG_LEVEL:DEBUG}
# -----------------------------------------------------------------------------
# MinIO 配置（本地开发环境使用 MinIO）
# -----------------------------------------------------------------------------
file-storage:
  type: minio

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:admin}
  secret-key: ${MINIO_SECRET_KEY:admin123456}
  bucket-name: ${MINIO_BUCKET_NAME:star-pivot-avatar}
  url-prefix: ${MINIO_URL_PREFIX:http://localhost:9000/star-pivot-avatar}

# StarPivot 统一配置
star-pivot:
  monitor:
    api-performance-enabled: true
    slow-api-threshold-ms: 1000
    sample-rate: 0.1

# 本地环境：默认关闭 Redis 健康检查，避免未启动 Redis 时反复报 WARN
# 启动 Redis 后可将 REDIS_HEALTH_ENABLED=true 或改为 true
management:
  health:
    redis:
      enabled: ${REDIS_HEALTH_ENABLED:false}
