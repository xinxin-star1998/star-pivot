# 生产环境配置文件
# 激活方式: spring.profiles.active=prod
# 注意: 生产环境所有敏感信息必须通过环境变量配置，不要使用默认值

spring:
  # 数据源配置 - 生产环境必须使用环境变量，且必须启用SSL
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 生产环境必须启用SSL，URL格式: jdbc:mysql://host:port/database?useSSL=true&requireSSL=true&serverTimezone=GMT%2B8
    url: ${DB_URL} # 必须通过环境变量配置
    username: ${DB_USERNAME} # 必须通过环境变量配置
    password: ${DB_PASSWORD} # 必须通过环境变量配置
  
  # Redis配置 - 生产环境
  data:
    redis:
      host: ${REDIS_HOST} # 必须通过环境变量配置
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD} # 生产环境建议设置密码
      database: ${REDIS_DATABASE:0}
      timeout: ${REDIS_TIMEOUT:2000ms}

# MyBatis-Plus 生产环境配置
mybatis-plus:
  configuration:
    # 生产环境使用SLF4J日志实现，不输出SQL到控制台
    log-impl: ${MYBATIS_LOG_IMPL:org.apache.ibatis.logging.slf4j.Slf4jImpl}

# JWT 生产环境配置
jwt:
  # 生产环境必须通过环境变量配置密钥，不要使用默认值
  secret: ${JWT_SECRET} # 必须通过环境变量配置

# CORS 生产环境配置
cors:
  # 生产环境必须配置具体域名，多个用逗号分隔，不允许使用 *
  allowed-origins: ${CORS_ALLOWED_ORIGINS} # 必须通过环境变量配置，例如: https://www.example.com,https://admin.example.com

# 日志生产环境配置
logging:
  level:
    root: info
    com.star.pivot: ${LOG_LEVEL:info}
    org.springframework.security: ${SECURITY_LOG_LEVEL:warn}
    org.apache.ibatis: ${SQL_LOG_LEVEL:OFF}
  # 生产环境日志文件配置
  file:
    name: logs/star-pivot.log
    max-size: 10MB
    max-history: 30

# 阿里云 OSS 生产环境配置
oss:
  endpoint: ${OSS_ENDPOINT} # 必须通过环境变量配置，例如：oss-cn-hangzhou.aliyuncs.com
  access-key-id: ${OSS_ACCESS_KEY_ID} # 必须通过环境变量配置
  access-key-secret: ${OSS_ACCESS_KEY_SECRET} # 必须通过环境变量配置
  url-prefix: ${OSS_URL_PREFIX:} # 可选，用于前端访问文件的自定义前缀（为空则使用默认格式）

