# 生产环境配置文件
# 激活方式: spring.profiles.active=prod
# 注意: 生产环境所有敏感信息必须通过环境变量配置，不要使用默认值

spring:
  # 数据源配置 - 生产环境必须使用环境变量，且必须启用SSL
  datasource:
    # 指定使用 Druid 数据源
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 生产环境必须启用SSL，URL格式: jdbc:mysql://host:port/database?useSSL=true&requireSSL=true&serverTimezone=GMT%2B8
    url: ${DB_URL} # 必须通过环境变量配置
    username: ${DB_USERNAME} # 必须通过环境变量配置
    password: ${DB_PASSWORD} # 必须通过环境变量配置
    # Druid 连接池配置（生产环境建议适当增大连接数）
    druid:
      # 初始连接数
      initial-size: 10
      # 最小空闲连接数
      min-idle: 10
      # 最大活跃连接数（根据实际并发量调整）
      max-active: 50
      # 获取连接等待超时时间（毫秒）
      max-wait: 60000
      # 配置间隔多久才进行一次检测，检测需要关闭的空闲连接，单位是毫秒
      time-between-eviction-runs-millis: 60000
      # 配置一个连接在池中最小生存的时间，单位是毫秒
      min-evictable-idle-time-millis: 300000
      # 用来检测连接是否有效的 SQL，要求是一个查询语句
      validation-query: SELECT 1
      # 建议配置为 true，不影响性能，并且保证安全性
      test-while-idle: true
      # 申请连接时执行 validationQuery 检测连接是否有效，做了这个配置会降低性能
      test-on-borrow: false
      # 归还连接时执行 validationQuery 检测连接是否有效，做了这个配置会降低性能
      test-on-return: false
      # 是否缓存 preparedStatement，也就是 PSCache。PSCache 对支持游标的数据库性能提升巨大，比如说 oracle。在 mysql 下建议关闭
      pool-prepared-statements: false
      # 要启用 PSCache，必须配置大于 0，当大于 0 时，pool-prepared-statements 自动触发修改为 true
      max-pool-prepared-statement-per-connection-size: -1
      # 配置监控统计拦截的 filters，去掉后监控界面 SQL 无法统计，'wall' 用于防火墙
      filters: stat,wall,slf4j
      # 通过 connectProperties 属性来打开 mergeSql 功能；慢 SQL 记录
      connection-properties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=5000
      # 合并多个 DruidDataSource 的监控数据
      use-global-data-source-stat: true
  
  # Redis配置 - 生产环境
  data:
    redis:
      host: ${REDIS_HOST} # 必须通过环境变量配置
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD} # 生产环境建议设置密码
      database: ${REDIS_DATABASE:0}
      timeout: ${REDIS_TIMEOUT:2000ms}

# MyBatis-Plus 生产环境配置
mybatis-plus:
  configuration:
    # 生产环境使用SLF4J日志实现，不输出SQL到控制台
    log-impl: ${MYBATIS_LOG_IMPL:org.apache.ibatis.logging.slf4j.Slf4jImpl}

# JWT 生产环境配置
jwt:
  # 生产环境必须通过环境变量配置密钥，不要使用默认值
  secret: ${JWT_SECRET} # 必须通过环境变量配置

# CORS 生产环境配置
cors:
  # 生产环境必须配置具体域名，多个用逗号分隔，不允许使用 *
  allowed-origins: ${CORS_ALLOWED_ORIGINS} # 必须通过环境变量配置，例如: https://www.example.com,https://admin.example.com

# 日志生产环境配置
logging:
  level:
    root: info
    com.star.pivot: ${LOG_LEVEL:info}
    org.springframework.security: ${SECURITY_LOG_LEVEL:warn}
    org.apache.ibatis: ${SQL_LOG_LEVEL:OFF}
  # 生产环境日志文件配置
  file:
    name: logs/star-pivot.log
    max-size: 10MB
    max-history: 30

# 阿里云 OSS 生产环境配置
oss:
  endpoint: ${OSS_ENDPOINT} # 必须通过环境变量配置，例如：oss-cn-hangzhou.aliyuncs.com
  access-key-id: ${OSS_ACCESS_KEY_ID} # 必须通过环境变量配置
  access-key-secret: ${OSS_ACCESS_KEY_SECRET} # 必须通过环境变量配置
  url-prefix: ${OSS_URL_PREFIX:} # 可选，用于前端访问文件的自定义前缀（为空则使用默认格式）

