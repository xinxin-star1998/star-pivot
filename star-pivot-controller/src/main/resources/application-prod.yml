# =============================================================================
# 生产环境：spring.profiles.active=prod
# =============================================================================
# 敏感信息必须通过环境变量注入，不要使用默认值。
#
# Druid 监控页（context-path 为 /api 时）：
#   完整地址：http://域名或IP:端口/api/druid/index.html
#   若 404，请确认访问地址带 /api 前缀；若前有 Nginx，需把 /api 代理到后端。

spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    druid:
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
        login-username: ${DRUID_LOGIN_USERNAME:admin}
        login-password: ${DRUID_LOGIN_PASSWORD:admin123}
      web-stat-filter:
        enabled: true
      initial-size: 10
      min-idle: 10
      max-active: 50
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 180000
      validation-query: SELECT 1
      validation-query-timeout: 3
      test-while-idle: true
      test-on-borrow: true
      test-on-return: false
      pool-prepared-statements: false
      max-pool-prepared-statement-per-connection-size: -1
      filters: stat,wall,slf4j
      connection-properties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=5000
      use-global-data-source-stat: true
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      database: ${REDIS_DATABASE:0}
      timeout: ${REDIS_TIMEOUT:2000ms}

mybatis-plus:
  configuration:
    log-impl: ${MYBATIS_LOG_IMPL:org.apache.ibatis.logging.slf4j.Slf4jImpl}

jwt:
  secret: ${JWT_SECRET}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS}

logging:
  level:
    root: info
    com.star.pivot: ${LOG_LEVEL:info}
    org.springframework.security: ${SECURITY_LOG_LEVEL:warn}
    org.apache.ibatis: ${SQL_LOG_LEVEL:OFF}
  file:
    name: logs/star-pivot.log
    max-size: 10MB
    max-history: 30

oss:
  endpoint: ${OSS_ENDPOINT}
  access-key-id: ${OSS_ACCESS_KEY_ID}
  access-key-secret: ${OSS_ACCESS_KEY_SECRET}
  url-prefix: ${OSS_URL_PREFIX:}
