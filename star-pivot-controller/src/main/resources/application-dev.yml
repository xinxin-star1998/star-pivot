# 开发环境配置文件
# 激活方式: spring.profiles.active=dev

spring:
  # 数据源配置 - 开发环境使用本地数据库
  datasource:
    # 指定使用 Druid 数据源
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
#    url: ${DB_URL:jdbc:mysql://localhost:3306/star-pivot?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=GMT%2B8}
    url: ${DB_URL:jdbc:mysql://101.201.181.191:3307/star_pivot_dev?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=GMT%2B8}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    # Druid 连接池配置
    druid:
      # 初始连接数
      initial-size: 5
      # 最小空闲连接数
      min-idle: 5
      # 最大活跃连接数
      max-active: 20
      # 获取连接等待超时时间（毫秒）
      max-wait: 60000
      # 配置间隔多久才进行一次检测，检测需要关闭的空闲连接，单位是毫秒
      time-between-eviction-runs-millis: 60000
      # 配置一个连接在池中最小生存的时间，单位是毫秒
      min-evictable-idle-time-millis: 300000
      # 用来检测连接是否有效的 SQL，要求是一个查询语句
      validation-query: SELECT 1
      # 建议配置为 true，不影响性能，并且保证安全性
      test-while-idle: true
      # 申请连接时执行 validationQuery 检测连接是否有效，做了这个配置会降低性能
      test-on-borrow: false
      # 归还连接时执行 validationQuery 检测连接是否有效，做了这个配置会降低性能
      test-on-return: false
      # 是否缓存 preparedStatement，也就是 PSCache。PSCache 对支持游标的数据库性能提升巨大，比如说 oracle。在 mysql 下建议关闭
      pool-prepared-statements: false
      # 要启用 PSCache，必须配置大于 0，当大于 0 时，pool-prepared-statements 自动触发修改为 true
      max-pool-prepared-statement-per-connection-size: -1
      # 配置监控统计拦截的 filters，去掉后监控界面 SQL 无法统计，'wall' 用于防火墙
      filters: stat,wall,slf4j
      # 通过 connectProperties 属性来打开 mergeSql 功能；慢 SQL 记录
      connection-properties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=5000
      # 合并多个 DruidDataSource 的监控数据
      use-global-data-source-stat: true
  
  # Redis配置 - 开发环境使用本地Redis
  data:
    redis:
      host: ${REDIS_HOST:101.201.181.191}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: ${REDIS_TIMEOUT:2000ms}

# MyBatis-Plus 开发环境配置
mybatis-plus:
  configuration:
    # 开发环境输出SQL到控制台，方便调试
    log-impl: ${MYBATIS_LOG_IMPL:org.apache.ibatis.logging.stdout.StdOutImpl}

# JWT 开发环境配置
jwt:
  # 开发环境可以使用默认密钥，生产环境必须通过环境变量配置
  secret: ${JWT_SECRET:Dj4G8272xJONkOqkn1pM8q1n+U5MPLrRUCjXun3/Yeo=}
  # 上一个密钥（可选，密钥轮换时配置）
  previous-secret: ${JWT_PREVIOUS_SECRET:}
    
# CORS 开发环境配置
cors:
  # 开发环境允许所有域名访问
  allowed-origins: ${CORS_ALLOWED_ORIGINS:*}

# 日志开发环境配置
logging:
  level:
    com.star.pivot: ${LOG_LEVEL:debug} # 开发环境使用debug级别
    org.springframework.security: ${SECURITY_LOG_LEVEL:debug}
    org.apache.ibatis: ${SQL_LOG_LEVEL:DEBUG} # 开发环境显示SQL日志

# 阿里云 OSS 开发环境配置
oss:
  endpoint: ${OSS_ENDPOINT:oss-cn-beijing.aliyuncs.com} # OSS 服务端点，例如：oss-cn-hangzhou.aliyuncs.com
  access-key-id: ${OSS_ACCESS_KEY_ID:LTAI5tG8uSJeTeuRYEY4x3nG} # AccessKey ID
  access-key-secret: ${OSS_ACCESS_KEY_SECRET:UdbPwjfPHoobovEhJ9hsZ3c9sdWqGR} # AccessKey Secret
  url-prefix: ${OSS_URL_PREFIX:} # 访问文件的前缀（前端展示用，可选，为空则使用默认格式）

# StarPivot 统一配置
star-pivot:
  monitor:
    # API性能监控是否启用（默认：true）
    api-performance-enabled: true
    # 慢接口阈值（毫秒），超过此值才记录到数据库
    # 默认：1000ms（1秒）
    # 开发环境建议：50-100ms（记录更多接口，便于调试）
    # 生产环境建议：1000ms（只记录真正的慢接口）
    slow-api-threshold-ms: 1000
    # 采样率（0~1），只记录指定比例的请求
    # 默认：0.1（10%）
    # 建议：0.1-0.5（根据接口频率调整）
    sample-rate: 0.1
