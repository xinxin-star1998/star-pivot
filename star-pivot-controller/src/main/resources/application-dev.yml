# 开发环境配置文件
# 激活方式: spring.profiles.active=dev

spring:
  # 数据源配置 - 开发环境使用本地数据库
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/star-pivot?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=GMT%2B8}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  
  # Redis配置 - 开发环境使用本地Redis
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: ${REDIS_TIMEOUT:2000ms}

# MyBatis-Plus 开发环境配置
mybatis-plus:
  configuration:
    # 开发环境输出SQL到控制台，方便调试
    log-impl: ${MYBATIS_LOG_IMPL:org.apache.ibatis.logging.stdout.StdOutImpl}

# JWT 开发环境配置
jwt:
  # 开发环境可以使用默认密钥，生产环境必须通过环境变量配置
  secret: ${JWT_SECRET:Dj4G8272xJONkOqkn1pM8q1n+U5MPLrRUCjXun3/Yeo=}

# CORS 开发环境配置
cors:
  # 开发环境允许所有域名访问
  allowed-origins: ${CORS_ALLOWED_ORIGINS:*}

# 日志开发环境配置
logging:
  level:
    com.star.pivot: ${LOG_LEVEL:debug} # 开发环境使用debug级别
    org.springframework.security: ${SECURITY_LOG_LEVEL:debug}
    org.apache.ibatis: ${SQL_LOG_LEVEL:DEBUG} # 开发环境显示SQL日志

# MinIO 开发环境配置
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000} # API 地址
  access-key: ${MINIO_ACCESS_KEY:admin} # 账号
  secret-key: ${MINIO_SECRET_KEY:admin123456} # 密码
  url-prefix: ${MINIO_URL_PREFIX:http://localhost:9000} # 访问文件的前缀（前端展示用）
