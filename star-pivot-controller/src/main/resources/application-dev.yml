# =============================================================================
# 开发环境：spring.profiles.active=dev
# =============================================================================
# 启动优化：懒加载、减小连接池、缩短超时，加快本地启动
spring:
  main:
    lazy-initialization: true  # 开发环境懒加载 Bean，显著缩短启动时间（首请求略慢）
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://101.201.181.191:3306/star_pivot_dev?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=GMT%2B8&connectTimeout=5000&socketTimeout=10000}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:Xin@19981223}
    druid:
      initial-size: 2
      min-idle: 2
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      pool-prepared-statements: false
      max-pool-prepared-statement-per-connection-size: -1
      filters: stat,wall,slf4j
      connection-properties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=5000
      use-global-data-source-stat: true
  data:
    redis:
      host: ${REDIS_HOST:101.201.181.191}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: ${REDIS_TIMEOUT:1500ms}

mybatis-plus:
  configuration:
    # 使用 Slf4j 与 logback 统一输出，便于控制级别与格式；需 SQL 时设 org.apache.ibatis=DEBUG
    log-impl: ${MYBATIS_LOG_IMPL:org.apache.ibatis.logging.slf4j.Slf4jImpl}

jwt:
  secret: ${JWT_SECRET:Dj4G8272xJONkOqkn1pM8q1n+U5MPLrRUCjXun3/Yeo=}
  previous-secret: ${JWT_PREVIOUS_SECRET:}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:*}

logging:
  level:
    com.star.pivot: ${LOG_LEVEL:debug}
    org.springframework.security: ${SECURITY_LOG_LEVEL:debug}
    org.apache.ibatis: ${SQL_LOG_LEVEL:DEBUG}

oss:
  endpoint: ${OSS_ENDPOINT:oss-cn-beijing.aliyuncs.com} # OSS 服务端点，例如：oss-cn-hangzhou.aliyuncs.com
  access-key-id: ${OSS_ACCESS_KEY_ID:LTAI5tG8uSJeTeuRYEY4x3nG} # AccessKey ID
  access-key-secret: ${OSS_ACCESS_KEY_SECRET:UdbPwjfPHoobovEhJ9hsZ3c9sdWqGR} # AccessKey Secret
  url-prefix: ${OSS_URL_PREFIX:} # 访问文件的前缀（前端展示用，可选，为空则使用默认格式）
# -----------------------------------------------------------------------------
# MinIO 配置（可选，如需使用 MinIO 替换 OSS）
# -----------------------------------------------------------------------------
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:admin}
  secret-key: ${MINIO_SECRET_KEY:admin123456}

# StarPivot 统一配置
star-pivot:
  monitor:
    api-performance-enabled: true
    slow-api-threshold-ms: 1000
    sample-rate: 0.1
