# =============================================================================
# 测试环境：spring.profiles.active=test
# =============================================================================

spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/star-pivot-test?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      pool-prepared-statements: false
      max-pool-prepared-statement-per-connection-size: -1
      filters: stat,wall,slf4j
      connection-properties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=5000
      use-global-data-source-stat: true
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:1}
      timeout: ${REDIS_TIMEOUT:2000ms}

mybatis-plus:
  configuration:
    log-impl: ${MYBATIS_LOG_IMPL:org.apache.ibatis.logging.slf4j.Slf4jImpl}

jwt:
  secret: ${JWT_SECRET:Dj4G8272xJONkOqkn1pM8q1n+U5MPLrRUCjXun3/Yeo=}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://test.example.com,http://localhost:3000}

logging:
  level:
    com.star.pivot: ${LOG_LEVEL:info}
    org.springframework.security: ${SECURITY_LOG_LEVEL:warn}
    org.apache.ibatis: ${SQL_LOG_LEVEL:OFF}
  file:
    name: logs/star-pivot-test.log
    max-size: 10MB
    max-history: 7

oss:
  endpoint: ${OSS_ENDPOINT:oss-cn-hangzhou.aliyuncs.com}
  access-key-id: ${OSS_ACCESS_KEY_ID:your-access-key-id}
  access-key-secret: ${OSS_ACCESS_KEY_SECRET:your-access-key-secret}
  url-prefix: ${OSS_URL_PREFIX:}
