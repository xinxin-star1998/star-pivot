# 测试环境配置文件
# 激活方式: spring.profiles.active=test

spring:
  # 数据源配置 - 测试环境
  datasource:
    # 指定使用 Druid 数据源
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 测试环境建议启用SSL
    url: ${DB_URL:jdbc:mysql://localhost:3306/star-pivot-test?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    # Druid 连接池配置
    druid:
      # 初始连接数
      initial-size: 5
      # 最小空闲连接数
      min-idle: 5
      # 最大活跃连接数
      max-active: 20
      # 获取连接等待超时时间（毫秒）
      max-wait: 60000
      # 配置间隔多久才进行一次检测，检测需要关闭的空闲连接，单位是毫秒
      time-between-eviction-runs-millis: 60000
      # 配置一个连接在池中最小生存的时间，单位是毫秒
      min-evictable-idle-time-millis: 300000
      # 用来检测连接是否有效的 SQL，要求是一个查询语句
      validation-query: SELECT 1
      # 建议配置为 true，不影响性能，并且保证安全性
      test-while-idle: true
      # 申请连接时执行 validationQuery 检测连接是否有效，做了这个配置会降低性能
      test-on-borrow: false
      # 归还连接时执行 validationQuery 检测连接是否有效，做了这个配置会降低性能
      test-on-return: false
      # 是否缓存 preparedStatement，也就是 PSCache。PSCache 对支持游标的数据库性能提升巨大，比如说 oracle。在 mysql 下建议关闭
      pool-prepared-statements: false
      # 要启用 PSCache，必须配置大于 0，当大于 0 时，pool-prepared-statements 自动触发修改为 true
      max-pool-prepared-statement-per-connection-size: -1
      # 配置监控统计拦截的 filters，去掉后监控界面 SQL 无法统计，'wall' 用于防火墙
      filters: stat,wall,slf4j
      # 通过 connectProperties 属性来打开 mergeSql 功能；慢 SQL 记录
      connection-properties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=5000
      # 合并多个 DruidDataSource 的监控数据
      use-global-data-source-stat: true
  
  # Redis配置 - 测试环境
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:1} # 测试环境使用不同的数据库索引
      timeout: ${REDIS_TIMEOUT:2000ms}

# MyBatis-Plus 测试环境配置
mybatis-plus:
  configuration:
    # 测试环境使用SLF4J日志实现，不输出SQL到控制台
    log-impl: ${MYBATIS_LOG_IMPL:org.apache.ibatis.logging.slf4j.Slf4jImpl}

# JWT 测试环境配置
jwt:
  # 测试环境建议使用环境变量配置密钥
  secret: ${JWT_SECRET:Dj4G8272xJONkOqkn1pM8q1n+U5MPLrRUCjXun3/Yeo=}

# CORS 测试环境配置
cors:
  # 测试环境配置允许的域名，多个用逗号分隔
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://test.example.com,http://localhost:3000}

# 日志测试环境配置
logging:
  level:
    com.star.pivot: ${LOG_LEVEL:info}
    org.springframework.security: ${SECURITY_LOG_LEVEL:warn}
    org.apache.ibatis: ${SQL_LOG_LEVEL:OFF}
  # 测试环境日志文件配置
  file:
    name: logs/star-pivot-test.log
    max-size: 10MB
    max-history: 7

# 阿里云 OSS 测试环境配置
oss:
  endpoint: ${OSS_ENDPOINT:oss-cn-hangzhou.aliyuncs.com} # OSS 服务端点，例如：oss-cn-hangzhou.aliyuncs.com
  access-key-id: ${OSS_ACCESS_KEY_ID:your-access-key-id} # AccessKey ID
  access-key-secret: ${OSS_ACCESS_KEY_SECRET:your-access-key-secret} # AccessKey Secret
  url-prefix: ${OSS_URL_PREFIX:} # 访问文件的前缀（前端展示用，可选，为空则使用默认格式）
